<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Playground — Claude</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      border-bottom: 0.5px solid rgba(0,0,0,0.12);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #1D9E75;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 18px; height: 18px; }

    header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
    }

    .model-badge {
      margin-left: auto;
      font-size: 12px;
      padding: 4px 10px;
      background: #E1F5EE;
      color: #0F6E56;
      border-radius: 20px;
      font-weight: 500;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
    }

    .avatar.claude { background: #E1F5EE; color: #0F6E56; }
    .avatar.user { background: #EEEDFE; color: #3C3489; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.claude .bubble {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 4px 16px 16px 16px;
      color: #1a1a18;
    }

    .message.user .bubble {
      background: #1D9E75;
      border-radius: 16px 4px 16px 16px;
      color: #ffffff;
    }

    .thinking {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      background: #888780;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #888780;
      text-align: center;
    }

    .empty-state .icon {
      width: 48px;
      height: 48px;
      background: #E1F5EE;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state p { font-size: 14px; }

    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-btn {
      font-size: 13px;
      padding: 8px 14px;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 20px;
      cursor: pointer;
      color: #444441;
      transition: background 0.15s;
    }

    .suggestion-btn:hover { background: #f0efeb; }

    .input-area {
      background: #ffffff;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      padding: 16px 24px;
    }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a18;
      background: #fafaf8;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: rgba(0,0,0,0.3); background: #fff; }
    textarea::placeholder { color: #b4b2a9; }

    .send-btn {
      width: 40px;
      height: 40px;
      background: #1D9E75;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: #0F6E56; }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { background: #B4B2A9; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }

    .error-msg {
      font-size: 13px;
      color: #A32D2D;
      background: #FCEBEB;
      border: 0.5px solid #F09595;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 8px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>AI Playground</h1>
  <span class="model-badge">claude-sonnet-4-6</span>
</header>

<div class="chat-container" id="chatContainer">
  <div class="empty-state" id="emptyState">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p>Ask Claude anything</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('Explain what you can help me with')">What can you help with?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Review this Java code for best practices: public void process() { System.out.println(\"hello\"); }')">Review Java code</button>
      <button class="suggestion-btn" onclick="sendSuggestion('What is Spring Boot and why is it useful?')">What is Spring Boot?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="messageInput" placeholder="Message Claude..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div id="errorMsg"></div>
</div>

<script>
  const API_URL = 'http://localhost:8080/api/v1/1.0/ai-model-interaction/ask-claude';
  const chatContainer = document.getElementById('chatContainer');
  const emptyState = document.getElementById('emptyState');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const errorMsg = document.getElementById('errorMsg');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(text) {
    messageInput.value = text;
    sendMessage();
  }

  function addMessage(text, role) {
    if (emptyState && emptyState.parentNode) {
      emptyState.remove();
    }

    const msg = document.createElement('div');
    msg.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'claude' ? 'C' : 'N';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return bubble;
  }

  function addThinking() {
    if (emptyState && emptyState.parentNode) emptyState.remove();

    const msg = document.createElement('div');
    msg.className = 'message claude';
    msg.id = 'thinkingMsg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar claude';
    avatar.textContent = 'C';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinkingMsg');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    errorMsg.innerHTML = '';
    messageInput.value = '';
    messageInput.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(text, 'user');
    addThinking();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: text
      });

      removeThinking();

      if (!response.ok) {
        throw new Error('Server returned ' + response.status);
      }

      const reply = await response.text();
      addMessage(reply, 'claude');

    } catch (err) {
      removeThinking();
      errorMsg.innerHTML = '<div class="error-msg">Could not reach the server. Make sure your Spring Boot app is running on port 8080.</div>';
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      messageInput.focus();
    }
  }
</script>
</body>
</html>
