<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Playground</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>AI Playground</h1>
  <select id="modelSelect" onchange="updateModelBadge(this.value)">
    <option value="claude">Claude Sonnet 4.6</option>
    <option value="openai">OpenAI GPT-4o</option>
  </select>
</header>

<div class="chat-container" id="chatContainer">
  <div class="empty-state" id="emptyState">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p>Ask Claude anything</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('Explain what you can help me with')">What can you help with?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Review this Java code for best practices: public void process() { System.out.println(\"hello\"); }')">Review Java code</button>
      <button class="suggestion-btn" onclick="sendSuggestion('What is Spring Boot and why is it useful?')">What is Spring Boot?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="messageInput" placeholder="Message AI..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div id="errorMsg"></div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
